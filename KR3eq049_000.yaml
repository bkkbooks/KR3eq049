body:
  text: 治肝卅法肝氣肝風肝火三者同出異名其中侮脾乘胃衝心犯肺挾寒挾痰本虛標實種種不同故肝病最雜而治法最廣姑錄大略於下肝氣證治一法曰疏肝理氣如肝氣自鬱於本經兩脅氣脹或痛者宜疏肝香附鬱金蘇梗青皮橘葉之屬兼寒加吳萸兼熱加丹皮山梔兼痰加半夏茯苓一法曰疏肝通絡如疏肝不應營氣痹窒絡脈瘀阻兼通血絡如旋覆新絳歸鬚桃仁澤蘭葉等一法曰柔肝如肝氣脹甚疏之更甚者當柔肝當歸杞子柏子仁牛膝兼熱加天冬生地兼寒加蓯蓉肉桂一法曰緩肝如肝氣甚而中氣虛者當緩肝炙草白芍大棗橘餅淮小麥一法曰培土泄木肝氣乘脾脘腹脹痛六君子湯加吳茱萸白芍木香即培土泄木之法也溫中疏木黃玉楸慣用此法一法曰泄肝和胃肝氣乘胃即肝木乘土脘痛嘔酸二陳加左金丸或白蔻金鈴子即泄肝和胃之法也一法曰泄肝如肝氣上衝於心熱厥心痛宜泄肝金鈴延胡吳萸川連兼寒去川連加椒桂寒熱俱有者仍入川連或再加白芍蓋苦辛酸三者為泄肝之主法也一法曰抑肝肝氣上衝於肺猝得脅痛暴上氣而喘宜抑肝如吳萸汁炒桑皮蘇梗杏仁橘紅之屬一法曰散肝木鬱則達之逍遙散是也肝欲散急食辛以散之即散肝是也肝風證治肝風一證雖多上冒巔頂亦能旁走四肢上冒者陽亢居多旁走者血虛為多然內風多從火出氣有餘便是火余故曰肝氣肝風肝火三者同出異名但為病不同治法亦異耳一法曰熄風和陽如肝風初起頭目昏眩用熄風和陽法羚羊丹皮甘菊鉤鉤決明白蒺藜即涼肝是也一法曰熄風潛陽如熄風和陽不效當以熄風潛陽如牡蠣生地女貞子玄參白芍菊花阿膠即滋肝是也一法曰培土寧風肝風上逆中虛納少宜滋陽明泄厥陰如人參甘草麥冬白芍甘菊玉竹即培土寧風法亦即緩肝法也一法曰養肝如肝風走於四肢經絡牽掣或麻者宜養血熄風生地歸身杞子牛膝天麻制首烏三角胡麻即養肝也一法曰暖土以禦寒風如金匱近效白朮附子湯治風虛頭重眩苦極不知食味是暖土以禦寒風之法此非治肝實補中也一法曰平肝金鈴蒺藜鉤鉤橘葉一法曰搜肝外此有搜風一法凡人必先有內風而後外風亦有外風引動內風者故肝風門中每多夾雜則搜風之藥亦當引用也如天麻羌活獨活薄荷蔓荊子防風荊芥殭蠶蠶蛻白附子肝火證治肝火燔灼遊行於三焦一身上下內外皆能為病難以枚舉如目紅顴赤痙厥狂躁淋秘瘡瘍善飢煩渴嘔吐不寐上下血溢皆是一法曰清肝如羚羊丹皮黑梔黃芩竹葉連翹夏枯草一法曰瀉肝如龍膽瀉肝湯瀉青丸當歸龍薈丸之類一法曰清金制木肝火上炎清之不已當制肝乃清金以制木火之亢逆也如沙參麥冬石斛枇杷葉天冬玉竹石決明一法曰瀉子如肝火實者兼瀉心如甘草黃連乃實則瀉其子也一法曰補母如水虧而肝火盛清之不應當益腎水乃虛則補母之法如六味丸大補陰丸之類亦乙癸同源之義也一法曰化肝景岳治鬱怒傷肝氣逆動火煩熱脅痛脹滿動血等證用青皮陳皮丹皮山梔芍藥澤瀉貝母方名化肝煎是清化肝經之鬱火也肝寒肝虛等證治一法曰溫肝如肝有寒嘔酸上氣宜溫肝肉桂吳萸蜀椒如兼中虛胃寒加人參乾薑即大建中湯法也一法曰補肝如制首烏菟絲子杞子棗仁萸肉脂麻沙苑蒺藜一法曰鎮肝如石決明牡蠣龍骨龍齒金箔青鉛代赭石磁石之類一法曰斂肝如烏梅白芍木瓜此三法無論肝氣肝風肝火相其機宜皆可用之一法曰補肝陰地黃白芍烏梅一法曰補肝陽肉桂川椒蓯蓉一法曰補肝血當歸川斷牛膝川芎一法曰補肝氣天麻白朮菊花生薑細辛杜仲羊肝醫話醫雖小道而義精工賤而任重余自習醫以來兢兢業業造次於是顛沛於是歷經卅餘年成就些微事業多從困苦勤慎中得之汝輩學醫且將遊戲念頭刪除淨盡然後耐煩做去何愁不日進於高明醫仁術也其心仁其術智愛人好生為之仁聰明權變為之智仁有餘而智不足尚不失為誠厚之士若智有餘而仁不足則流為欺世虛狂之徒凡治一病先須細心診視其病雖輕亦不可輕許無事恐其人因病輕而自忽致生他變也其病雖重亦不宜決裂回絕恐病家聞而生怖愈致慌張也然真正無妨與絕證畢具不可救者不在此例曾有一病人年約十三四其母呼之出外廂診視其面色青黃而無和悅之氣目向下視亦不轉瞬其脈小身無熱問其疾苦不答其母代言曰咳嗽十餘日矣余處以平常治嗽套方一劑明日即死余聞之駭然自咎識淺術疏後又遇一船家年約四十面色雖不青然神呆目睛不轉脈亦小病咳嗽氣急問其疾不答余即回卻後兩日果死矣此屬肺絕證經曰肺絕之脈如風吹毛蓋言其細也前二證神氣已離其死必矣又見一女子年十八九四月間患時證與其母同日得病至七日同時戰汗其母戰陷發厥而死女正得汗未收聞母死驚起號淘痛哭極力勸慰方止自此如醉如呆兀坐不語邀余診治脈極弦而銳目睛環轉不定此為膽絕之候也因驚傷膽神魂失守不可為也果至晚發狂而死經云少陽終者目睘絕系絕系者一日半死又曰得神者昌失神者亡又曰狂言者失志失志者死臟結為死證仲聖戒不可攻余曾治二人皆不治而死其一素有肝氣其一素有癖塊皆卒然腹中硬滿大痛得食則嘔二便不行腹中硬塊或豎或橫者數條初用深師七氣湯如吳萸官桂木香厚朴烏藥等送下備急丸五粒不得利又轉用許學士溫脾湯亦不得利他醫進仲景黃連湯加肉桂痛嘔亦不止一人四日死一人三日死竟一無辦法旭高自按或曰灸關元或可救然其人痛無暫安安能施灸法哉每思陰邪盤踞臟氣凝結不通不出若用通陽之屬如附子肉桂乾薑半夏茯苓烏藥澤瀉等味送下來復丹通臟腑之陽理三焦之氣假我數年再遇斯證得試此法未識何如一嫗年五十有餘當冬月大便後腹中微痛胸悶滿噁心微惡寒微發熱初醫以為感寒用疏通發散藥不效延至旬外邀余治之診得脈左沉小右脈浮而無力此中氣虛而感寒也當用六君子湯加炮薑木香蘇葉汁意議已定方亦寫出適某醫來與之商訂將方請正醫曰今病已十餘日不大便且胸腹滿悶暫緩參朮炮姜易入枳殼栝蔞稍磨紫金錠香開氣分治其痛滿病者正愁大便不通未敢進食主翁亦畏投補劑恐滋脹滿遂聽某醫之言余亦未便與之爭論詎知藥下即大解初尚稀溏後即稀水泄瀉不休肢冷不溫明日某醫始議參朮炮姜急煎已不納矣是晚遂斃此役也深悔余無主見假如當時力爭猶可挽救計不出此坐令致斃余深痛悔旭高自按或曰參朮炮姜但遲一日先一日則生遲一日則死恐亦未必余曰不然當其大便未泄元氣未脫早用此方十能救五竊憂世俗一患重證必多延醫眾因病重不肯負責互相推諉致誤事多矣慨夫浦瑤官年三十二形胖多痰多濕九月間因勞碌葷酒數日遂得伏暑證初起寒輕熱重如瘧狀一日輕一日重五六日後但熱不寒舌苔干黃大便不通熱甚煩躁脘腹硬痛余用大柴胡一服如神安穩一日仍復煩躁舌根苔仍干黃據其脘腹猶痛改用鮮斛栝蔞連翹山梔等送下滾痰丸三錢是晚便泄三次明日診視諸恙霍然余亦許其無事詎知薄暮心中難過外不發熱手足不溫神疲如迷喉中汨汨不休如嚥唾之聲口角津津涎沫流出不止直至三更發厥數次病家惶恐甫明即求治診得脈細如絲舌苔黃者變白而且濕膩余亦為之驚愕此所謂熱病未已寒病復起是也因其人中氣不足兩下之後中氣愈虧致太陰寒痰上升故有此急變進附子草果乾薑半夏茯苓陳皮等味或可挽救病家曰先生昨日用寒今日用熱有是理乎抑有所據乎但此子性命全託先生身上余聞此言因徐徐告曰醫之心仁心也所以敢冒不韙而隨機應變有是證必有是藥昨熱用寒今寒用熱又何疑乎余肯寫此方是余之熱心也服與不服余不相強然勢已急欲圖萬一之幸舍此別無良法言畢辭歸次日復來請蓋喜其昨幸服藥見效矣連進附子四貼而痊然寒證已退已能啜粥數盞尚有餘波仍復寒熱如瘧但不甚重耳再以豆卷半夏等平調五六劑而瘥錢氏子翩翩少年也未完婚春心勃勃偶宿妓勇於使內染淋濁莖中作痛連毛際醫用分清滲利藥淋痛俱減但覺少腹中央下連毛際時隱痛以後或大痛或微痛或不痛或用金鈴子延胡索或用吳萸烏藥或用韭根兩頭尖皆不效一醫用肉桂五苓散痛止兩日而復作又用補中益氣湯其痛更甚始邀余診余望問之下知此子腎氣素虧竭力使內又斫傷腎氣敗精化而為濁初醫過用滲利寒藥再傷腎臟之陽醫用肉桂止痛痛止二日者得溫通之力也改用升提補中藥痛勢反甚者下焦精氣兩虧升其陽則腎益虧也當用金匱腎氣丸補陰中之陽據其宅窟而招安之服下痛果定有時仍微痛連服腎氣湯十餘貼後改用腎氣丸每朝服三錢一月痊愈旭高自按夫此病用腎氣丸而無疑者全從服過肉桂止痛二日悟出古人云會心處非別有玄妙也有人染楊梅瘡服過輕粉升藥抑遏其毒於內瘡愈之後多致筋骨攣痛數年之後隨其痛處必發出一塊色白不紅漸潰腐爛連年累月不肯收斂遂成廢疾瘍科心得集中載十味淡齋方忌食鹽味一百二十日無有不愈者然有脾胃薄弱驕恣任性之人不肯服淡將如之何余見外科發揮載一方用土茯苓四兩氣虛加四君子湯一兩血虛加四物湯一兩煎湯飲月餘即驗集驗方更加皂莢子七粒川椒四十九粒有熱者再加芩連仿此治之亦一法也凡生疔疽部位初起一粒雖小須要小心切不可說無事余嘗見唇疔一粒其形甚小並無寒熱以為無事其人能食酒肉亦不避風三五日後即走黃而死對口發背變端稍遲然斷不可輕視忽略說話之中須要活落免致擔憂有孕無孕辨別最難方書雖有手少陰脈動甚者妊子也一句然竟有心脈不甚顯著者大抵經阻二三月小有寒熱或時嘔惡是為懷子之象若腹中痛者非胎也若乳頭紫黑色者是胎也乳頭轉色紫黑乃是有胎之的候再者察其人形象康健否雖有時不食有時仍能食此即所謂疑病也凡看咳嗽病或陰精虧損之體或元氣素弱之軀無病之時已先腿足乏力或手足心灼熱在女子或經水不調而漸生咳嗽便是虛勞之根切不可大進辛溫消痰以及表散之藥便宜甘潤生津如川貝玉竹甜杏仁穭豆衣沙參等類若兼頭眩心悸加入茯神滁菊之類或有稍夾風邪而起者亦不過加入桑葉桔梗之屬倘若但以前胡杜蘇子牛蒡荊芥防風橘葉橘紅枳殼萊菔子等味必致劫津而成喘逆嗆咳及見惡寒潮熱虛勞之病成矣此等病甚多切宜仔細一婦人通身發出紅斑大者如黃豆小者如綠豆皆平而不腫又無脂水至夜則癢甚日中稍可此是血虛生風詢其證經水一月兩至淋漓不斷且頭眩心跳心嘈顯然血虛生風熱灼營陰膚髮紅斑而搔癢也用生地阿膠穭豆衣白芍胡麻等而瘥若認為風濕而用祛風燥濕則謬矣飲邪作痛在脅為多或停中脘其痛也或嘔酸苦青綠水或腹中漉漉有聲或大便泄瀉稀水則痛反松脈沉而弦是其候也治宜溫通蠲飲如乾薑半夏陳皮茯苓桂枝澤瀉等味昔見一中年婦人病脘脅痛皆以為肝氣服藥不效飲食泛嘔而不納十餘日米粒不進但飲茶數口而已一日呻吟不安囑咐後事眾皆以為必死傾忽嘔稀水半桶倦極不語者半日醒後漸思食以米湯少少飲之不嘔再與稀糊粥少許頻頻飲下亦不嘔從此調理月餘居然平復今歲見一老嫗年逾七十亦病脘痛舌苔微白諸藥不效後竟不服藥米粒不進共十八日惟瞑目待斃而已詎知忽然瀉出稀水黃糞甚多從此漸思穀食未幾即復今已談笑自若矣旭高曰是證之得不死者雖然粒食不進但神氣全無死象如痛定時言語清楚其正氣尚未脫離是以不致於死得能平復須知脘腹痛證若大痛不休者必死且速若時作時止者未必便死亦臨證之要訣高氏女將出閣夏末秋初趕緊刺繡黃昏早起勞碌殊甚於七月十三日清晨出幃開窗忽聞鵲噪頓生驚疑汗出浹背早膳食麵一碗遂覺懶不怡至夜忽發熱頭大痛初醫以為肝陽但用清泄重鎮之劑如羚羊決明等藥不效再易一醫用龍膽瀉肝湯送下當歸龍薈丸詎知藥入即吐從此湯水不得進納即嘔吐壯熱無汗神識昏蒙滿頭皆痛小溲短赤始邀余診及余至適值老醫張三明亦至同至內診視畢張曰壯熱無汗必夾風邪舌苔黃膩必夾痰濁雖有肝陽當先解表化痰余亦以為然遂用牛蒡荊芥薄荷蔓荊滑石半夏橘皮竹茹磨沖玉樞丹明日又來請據云病大增劇一夜不安幾乎發厥聞之駭然隨往診視詢之乃知昨日仍服苦降清泄之方余躊躇良久而後言曰內因肝風上升外因暑風挾積論理當散風邪兼消食積而後清鎮肝陽既得多方轉側今已先授清鎮將胃中所蘊之痰濁食滯盡阻遏在中氣不得通因而嘔逆邪不得散因而壯熱無汗舌苔黃濁大便六七日不通脈象弦滑數疾病機偏向於裡雖頭痛如破固屬肝陽而神糊煩躁胸膈已如燎原為今之計莫若且用涼膈散表裡雙解俟得汗得便神氣稍清再進熄風和陽之藥循序圖治庶可漸臻坦途於是竟疏涼膈散全方服下得寐少頃先出慄糞後下稀溏三四次遽而一夜安然直至黎明木旺陽升之際忽手指牽引面色變青舉家慌亂以為痙厥莫可挽救邀集諸醫商討皆言難治其危在傾刻深怪涼膈之非眾楚方咻適余應邀請亦至診得脈象弦特少和神氣略清頭痛時止時甚余曰諸公所言痙厥在邇有何確據眾曰脈細數肢冷手足搐搦豈非痙厥余曰唯唯尚容緩思得汗得便一夜安然表裡盡行暢達肢雖不溫而非厥冷是熱退而和也頭痛時作乃肝陽為劇耳舌苔黃膩仍兼痰濁此時當用熄風和陽化痰安神之劑為治眾議遂息乃投羚羊決明半夏茯神川連橘紅枳實鉤鉤菖蒲竹瀝薑汁等味調珠珀散六七分明日再診喜其病勢漸安即仿此加入鮮薄荷根因其喉間痰膩且身尚微熱而無汗也連進兩服而諸證皆平矣溫邪證三五日或六七日面目肢體發黃者多生於茶客酒客輩平日素多濕熱一受溫邪穢濁蒸熏即發黃疸往往外無大熱舌苔濁厚而又煩躁不安渴不多飲神氣昏狂或有汗或無汗脈或大滑或沉數或用茵陳梔子大黃或用犀角鮮地茵陳石斛苓梔芩滑如甘露飲等所見五六證皆死大抵傷寒論中發黃無穢濁蒙閉故無汗者用麻黃連翹赤小豆湯使濕熱從外而泄有汗者用茵陳蒿湯使濕熱從下而泄此溫邪發黃濕熱蒸熏於外穢濁蒙閉於內故難治當細細參究質問諸博雅姑記於此驗後之得失凡虛體及吃鴉片之人病溫邪五六日忽然煩躁大汗出而熱仍不退神識反昏或反大熱煩躁昏狂此屬正虛不能敵邪外出而反內陷也或停一日亦有再作寒慄戰汗而神識乃清者如葉氏所云邪盛正虛不能一戰而解停一二日再戰汗而愈者是也倘若再戰而神識不清反加痰喘呃忒則頓時生變此不可不知凡有疝氣之人忽發寒熱腎囊腫大其色帶紅者防發囊癰此其一也又有不發囊癰者或胯凹或腿膝腫痛色紅醫作濕火例治然吃煙之人或高年正虛之輩腫痛不已而其脾胃薄弱頻仍作呃蓋肝腎之氣上衝於胃也此證必凶多吉少用人參丁香柿蒂旋覆花代赭石等呃止者生不止者死曾見一種舌苔舌根至舌心或黃或白舌尖至舌心光紅無苔其舌心有苔無苔交界處宛如刀切之狀此謂兩截舌陰陽不交之確證又有一邊有苔一邊無苔左右各半者此謂營衛隔絕其證必凶江陰巷李三喜之妻因夏月起造房屋勞碌受熱至秋季遂患肛門之內臟頭之間後重氣墜頻欲登圊但有紅膩點滴些些並無糞穢自服制大黃解下干糞後稍松但肛門墜痛一日數十次終不減屢易諸醫皆以為痢疾用川連木香芩芍皆不效已數十日矣始邀余診脈尺部洪大詢其病由因夏暑勞碌過度濕熱下注腸臟之頭結為臟毒以致臟頭腫熱疼痛如刺如得下膿血少許則痛稍松須臾仍氣墜腹脹則又欲登圊雖有似乎痢疾但腹中不痛痛在臟頭肛門之裡非痢疾乃臟毒定方用川連胡連犀角苦參子槐米炭地榆炭金銀花象牙屑刺蝟皮蘆薈共等分為末用豬臟頭一個酒煮爛與前藥和為丸初服每朝二錢五分半月後每朝一錢五分以後逐漸減少但服此方必腹中略痛片刻解下穢糞極臭墜痛從此大松服此丸二十日忽然瀉下汙血鮮血有半桶許舉家驚惶急來邀余處以歸脾湯去木香加白芍阿膠連服三貼神氣即復仍服前丸每日一錢用黃耆黨參煎湯送下從此漸臻坦途門人繆禮和曰此病究因勞乏受熱氣陷熱潛宜用歸脾湯加苦參大黃為佳斯言誠然但余所用丸藥專主臟毒如初起體質未虛而濕熱下注腸臟則歸脾湯加苦參大黃為優也張川官之孫年十八歲冬月感寒夾積腹痛泄瀉他醫用吳萸木香烏藥檳楂以溫中消積泄止得干屎但少腹板窒小便不利適戚墅堰吳仲三子到錫因請診治斷為腸癰用黃耆銀花當歸等味一服遂便下如水晶魚腦之膩質而老醫趙桂三亦同聲附和於吳方加入延胡等味服二三劑後病勢日篤日夜泄白膩凍數十次小便不通邀余診視細繹病情斷非腸癰適趙醫亦至礙於前輩只得委屈周旋立案曰腸癰為病有寒有熱熱者大黃牡丹皮湯寒者苡仁附子敗醬散此古人規則也是證脈弦緊而不數面色青而不渴屬寒積也鄙意宜用溫通遂以肉桂五苓散加楂肉砂仁一服見效即加炮薑木香第三方因溺後氣向下墜腰尻痠痛全屬陽虛氣陷之象用東垣法參入前方如黨參升麻冬朮肉桂茯苓澤瀉炮薑木香訶子鹿角砂仁連服三劑大便白膩全止脾胃已開面色紅活遂去肉桂減輕炮姜服數劑全愈旭高曰以上二證李氏婦明明是臟毒諸醫以為痢疾張氏孫顯然寒痢諸醫反謂腸癰是非顛倒舉世皆然可慨也
